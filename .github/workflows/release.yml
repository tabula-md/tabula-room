name: Release Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish. Leave blank to use the selected workflow ref."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-docker-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve publish ref
        id: release
        shell: bash
        run: |
          ref="${{ github.event.inputs.ref || github.ref }}"
          if [[ "$ref" != refs/* && "$ref" == v*.*.* ]]; then
            ref="refs/tags/$ref"
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"

          if [[ "$ref" == refs/tags/v*.*.* ]]; then
            tag="${ref#refs/tags/}"
            version="${tag#v}"
            base_version="${version%%-*}"
            major="${base_version%%.*}"
            rest="${base_version#*.}"
            minor="${rest%%.*}"
            major_minor="$major.$minor"
            echo "is_version_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
          else
            echo "is_version_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Validate release version
        if: steps.release.outputs.is_version_tag == 'true'
        run: node scripts/validate-release-version.mjs "${{ steps.release.outputs.version }}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=${{ steps.release.outputs.version }},enable=${{ steps.release.outputs.is_version_tag == 'true' }}
            type=raw,value=${{ steps.release.outputs.major_minor }},enable=${{ steps.release.outputs.is_version_tag == 'true' }}
            type=raw,value=${{ steps.release.outputs.tag }},enable=${{ steps.release.outputs.is_version_tag == 'true' }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release.outputs.is_version_tag == 'true' }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
